<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD · Supabase</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <div id="toast" class="toast" aria-live="polite"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">DataHub</span>
      </div>
      <div class="header-meta">
        <span id="record-count" class="badge">0 registros</span>
        <div id="connection-status" class="conn-status offline" title="Status da conexão">
          <span class="conn-dot"></span>
          <span class="conn-label">offline</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">

    <section class="form-panel" id="form-panel">
      <div class="panel-header">
        <h2 id="form-title"><i class="ph ph-plus-circle"></i> Novo Registro</h2>
        <button id="btn-toggle-form" class="btn btn-ghost icon-btn" title="Recolher formulário">
          <i class="ph ph-caret-up"></i>
        </button>
      </div>

      <form id="main-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="field-nome">Name <span class="required">*</span></label>
            <div class="input-wrap">
              <i class="ph ph-user input-icon"></i>
              <input type="text" id="field-nome" placeholder="Full name" autocomplete="off" />
            </div>
            <span class="field-error" id="err-nome"></span>
          </div>

          <div class="form-group">
            <label for="field-email">Email <span class="required">*</span></label>
            <div class="input-wrap">
              <i class="ph ph-envelope input-icon"></i>
              <input type="email" id="field-email" placeholder="example@email.com" autocomplete="off" />
            </div>
            <span class="field-error" id="err-email"></span>
          </div>

          <div class="form-group">
            <label for="field-senha">Password <span class="required">*</span></label>
            <div class="input-wrap">
              <i class="ph ph-lock input-icon"></i>
              <input type="password" id="field-senha" placeholder="Minimum 6 characters" autocomplete="new-password" />
              <button type="button" class="toggle-pwd" id="toggle-senha" tabindex="-1" title="Show/hide password">
                <i class="ph ph-eye" id="eye-senha"></i>
              </button>
            </div>
            <span class="field-error" id="err-senha"></span>
          </div>

          <div class="form-group" id="group-confirma">
            <label for="field-confirma">Confirm Password <span class="required">*</span></label>
            <div class="input-wrap">
              <i class="ph ph-lock-key input-icon"></i>
              <input type="password" id="field-confirm-password" placeholder="Repeat password" autocomplete="new-password" />
              <button type="button" class="toggle-pwd" id="toggle-confirma" tabindex="-1" title="Show/hide password">
                <i class="ph ph-eye" id="eye-confirma"></i>
              </button>
            </div>
            <span class="field-error" id="err-confirma"></span>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-submit" class="btn btn-primary">
            <i class="ph ph-floppy-disk"></i>
            <span id="btn-submit-label">Salvar</span>
            <span id="btn-loader" class="btn-loader hidden"></span>
          </button>
        </div>
      </form>
    </section>

    <section class="table-panel">
      <div class="panel-header">
        <h2><i class="ph ph-table"></i> Registros</h2>
        <div class="table-controls">
          <div class="search-wrap">
            <i class="ph ph-magnifying-glass"></i>
            <input type="search" id="search-input" placeholder="Filtrar por nome ou e-mail…" />
          </div>
          <button id="btn-refresh" class="btn btn-ghost icon-btn" title="Recarregar">
            <i class="ph ph-arrows-clockwise"></i>
          </button>
        </div>
      </div>

      <div id="table-loader" class="table-loader">
        <div class="spinner"></div>
        <p>Buscando dados…</p>
      </div>

      <div id="table-empty" class="table-empty hidden">
        <i class="ph ph-folder-open"></i>
        <p>Nenhum registro encontrado.</p>
      </div>

      <div class="table-wrapper" id="table-wrapper">
        <table id="data-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Senha</th>
              <th>Criado em</th>
            </tr>
          </thead>
          <tbody id="table-body">
            </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
